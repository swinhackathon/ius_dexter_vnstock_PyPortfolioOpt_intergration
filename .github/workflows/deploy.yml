name: CI

# ============================================================
# CI pipeline — runs on every push to main / PR
# App Runner Source Code mode handles deploy automatically:
#   git push main → App Runner detects → build → deploy
# This workflow only runs type checks and tests.
# ============================================================

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  checks:
    name: Typecheck & Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - task: typecheck
            command: bun run typecheck
          - task: test
            command: bun test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: dexter
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run ${{ matrix.task }}
        working-directory: dexter
        run: ${{ matrix.command }}
